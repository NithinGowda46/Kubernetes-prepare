apiVersion: v1
kind: ResourceQuota
metadata:
  name: scaling-scheduling-quota
  namespace: scaling-scheduling
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi
    pods: "3"
    services: "2"
    persistentvolumeclaims: "2"
    configmaps: "2"
    secrets: "2"